name: Sync upstream

on:
  schedule:
    - cron: '0 2 * * *'  # 每天凌晨 2 点
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync upstream
        run: |
          git remote add upstream https://github.com/rivet-dev/jj-forklift.git
          git fetch upstream
          git checkout main
          git merge upstream/main --ff-only || git merge upstream/main -m "chore: sync upstream"
          git push origin main
